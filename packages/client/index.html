<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>冲向黄金城</title>
    <link rel="icon" type="image/jpeg" href="/textures/terrain-realistic/eldorado.jpg" />
    <meta name="theme-color" content="#1b1f16" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="board"></canvas>
      <div id="hud"></div>
      <div id="lobby"></div>
      <div id="bootloader" role="status" aria-live="polite">
        <div class="boot-shade"></div>
        <div class="boot-panel">
          <div class="boot-mark">🏆</div>
          <div class="boot-kicker">正在进入探险</div>
          <div class="boot-title">冲向黄金城</div>
          <div class="boot-copy">装载地图、卡牌与遗迹画面</div>
          <div class="boot-progress" aria-label="加载进度">
            <span id="bootbar" style="width:0%"></span>
          </div>
          <div class="boot-percent"><b id="bootpct">0%</b><span id="boottext">准备资源</span></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
