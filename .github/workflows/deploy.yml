# =============================================================================
# El Dorado — CI/CD
# 触发：push 到 main 时自动 build 镜像推送到 ghcr.io
# 也可手动触发（workflow_dispatch）
#
# 镜像仓库：ghcr.io/donle/el-dorado（与 double-jump 完全独立）。
# **部署只走手动**（scripts/deploy.sh → SSH 服务器本地 build），
# 之前这里还有个 deploy job 会 SSH 重启服务器容器，已删除，避免 push 触发
# 与本地一键脚本双路径撞车。
# =============================================================================

name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: donle/el-dorado

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max